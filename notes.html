<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f5f1e7">
  <title>Weight Note · Ghi chú</title>
  <link rel="stylesheet" href="css/index.css">
</head>
<body>
  <main class="app-shell">
    <header class="page-header">
      <div><p class="page-kicker">  <h1 class="page-title">Ghi chú</h1></div>
      <span class="note-save-state" id="note-save-state">Tự lưu</span>
    </header>

    <section class="note-shell">
      <input class="note-title-input" id="note-title" placeholder="Tiêu đề ghi chú…" aria-label="Tiêu đề ghi chú">

      <div class="editor-toolbar" aria-label="Thanh định dạng">
        <button class="editor-tool" type="button" data-command="undo" title="Hoàn tác">↶</button>
        <button class="editor-tool" type="button" data-command="redo" title="Làm lại">↷</button>
        <button class="editor-tool" type="button" data-command="bold" title="In đậm"><b>B</b></button>
        <button class="editor-tool" type="button" data-command="italic" title="In nghiêng"><i>I</i></button>
        <button class="editor-tool" type="button" data-command="underline" title="Gạch chân"><u>U</u></button>
        <button class="editor-tool" type="button" data-command="formatBlock" data-value="H1" title="Tiêu đề lớn">H1</button>
        <button class="editor-tool" type="button" data-command="formatBlock" data-value="H2" title="Tiêu đề nhỏ">H2</button>
        <button class="editor-tool" type="button" data-command="insertUnorderedList" title="Danh sách chấm">• </button>
        <button class="editor-tool" type="button" data-command="insertOrderedList" title="Danh sách số">1. </button>
      </div>

      <article id="note-editor" class="note-editor" contenteditable="true" spellcheck="true" data-placeholder="Viết bất cứ thứ gì ở đây…"></article>
    </section>
  </main>

  <nav class="bottom-nav" aria-label="Điều hướng chính">
    <a class="nav-link" href="index.html"><svg class="icon"><use href="assets/icons.svg#home"></use></svg><span>Trang chủ</span></a>
    <a class="nav-link" href="nutrition.html"><svg class="icon"><use href="assets/icons.svg#nutrition"></use></svg><span>Dinh dưỡng</span></a>
    <a class="nav-link active" href="notes.html"><svg class="icon"><use href="assets/icons.svg#note"></use></svg><span>Ghi chú</span></a>
    <a class="nav-link" href="profile.html"><svg class="icon"><use href="assets/icons.svg#profile"></use></svg><span>Cá nhân</span></a>
  </nav>

  <script type="module" src="js/pages/notes.js"></script>
</body>
</html>
